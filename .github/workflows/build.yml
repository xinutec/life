---
name: build

# life (Rust backend + Angular frontend) — gate on clippy + cargo test, then
# build and push the single image xinutec/life:latest to Docker Hub. The k8s
# manifests live in the home monorepo (xinutec/pippijn code/kubes/life/k8s); the
# image tag is the only contract between this repo and the deploy.
#
# There is NO image automation (no Flux/Argo image controller). The Deployment
# pins :latest — a fixed string — so a new push changes nothing on the cluster by
# itself. After this workflow goes green, roll it out by hand; the restart pulls
# the fresh image (:latest ⇒ imagePullPolicy: Always):
#   ssh root@isis.xinutec.org "kubectl -n life rollout restart deploy/life-app \
#     && kubectl -n life rollout status deploy/life-app --timeout=180s"
on:
  push:
    branches: [main]
    # Images build from rust:1-bookworm / node:24-alpine, never the flake, so a
    # flake.lock-only change can't affect the image — skip the rebuild.
    paths-ignore:
      - "**/flake.lock"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container: rust:1-bookworm
    # A throwaway MariaDB so the per-entity DB round-trip tests actually run
    # (they migrate + exercise the real sync SQL; they skip when the env var is
    # unset, which is the local no-DB case).
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: life_test
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      LIFE_TEST_DATABASE_URL: mysql://root:root@mariadb:3306/life_test
    steps:
      - uses: actions/checkout@v6
      # Cache ~/.cargo (registry + git) and target/, keyed on Cargo.lock — without
      # this the container re-downloads and re-compiles the whole dep tree every
      # push (clippy + test), the bulk of this job's time.
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test -- --test-threads=1

  image:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: xinutec/life:latest
          # Commit stamp for the build-version the app surfaces (Dockerfile ARG).
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=xinutec/life:cache
          # mode=max also persists the builder-stage layers (npm ci, cargo deps),
          # not just the final image — so those expensive layers survive across runs.
          cache-to: type=registry,ref=xinutec/life:cache,mode=max
