<h2>Buy</h2>

@if (syncError(); as err) {
  <p class="sync-warn">{{ err }}</p>
}

<app-list-state
  [loading]="!loaded()"
  [empty]="items().length === 0"
  emptyIcon="shopping_cart"
  emptyText="Nothing on the list. Tap + to add what you need to buy."
/>

<mat-list>
  @for (it of items(); track it.ulid) {
    <mat-list-item>
      <mat-checkbox
        matListItemIcon
        [checked]="it.done"
        (change)="toggle(it)"
        [attr.aria-label]="'Bought ' + it.name"
      ></mat-checkbox>
      <span
        matListItemTitle
        class="row-title tappable"
        role="button"
        tabindex="0"
        (click)="view(it)"
        (keydown.enter)="view(it)"
        (keydown.space)="view(it); $event.preventDefault()"
      >
        @if (it.barcode || it.product_id) {
          <app-product-thumb
            class="inline-thumb"
            [barcode]="it.barcode"
            [productId]="it.product_id"
          />
        }
        <span [class.done]="it.done">{{ it.name }}</span>
      </span>
      @if (label(it)) {
        <span matListItemLine [class.done]="it.done">{{ label(it) }}</span>
      }
      <button
        matListItemMeta
        mat-icon-button
        [matMenuTriggerFor]="rowMenu"
        [matMenuTriggerData]="{ it }"
        aria-label="More actions"
      >
        <mat-icon>more_vert</mat-icon>
      </button>
    </mat-list-item>
  }
</mat-list>

<!-- One menu, reused per row via context — Edit and Remove tuck here so the row
     tap is free to open the product's detail page. -->
<mat-menu #rowMenu>
  <ng-template matMenuContent let-it="it">
    <button mat-menu-item (click)="edit(it)">
      <mat-icon>edit</mat-icon>
      <span>Edit</span>
    </button>
    <button mat-menu-item (click)="remove(it)">
      <mat-icon>delete</mat-icon>
      <span>Remove</span>
    </button>
  </ng-template>
</mat-menu>

@if (doneCount() > 0) {
  <div class="bought-actions">
    <button mat-flat-button (click)="buyDone()">
      <mat-icon>add_shopping_cart</mat-icon>
      Got {{ doneCount() }} → add to inventory
    </button>
    <button mat-button (click)="clearDone()">Clear bought</button>
  </div>
}

<!-- Always present: mid-shop ("add the thing I just remembered") is exactly when
     adding matters most. The bought bar keeps left of it (see .bought-actions). -->
<div class="fab-anchor">
  <button mat-fab class="add-fab" (click)="openAdd()" aria-label="Add to the list">
    <mat-icon>add</mat-icon>
  </button>
</div>
