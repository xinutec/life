<div class="shop-search">
  <h2 mat-dialog-title>Find on {{ provider.displayName }}</h2>

  <mat-form-field appearance="outline" subscriptSizing="dynamic">
    <mat-label>Search</mat-label>
    <input
      matInput
      [ngModel]="query()"
      (ngModelChange)="query.set($event)"
      (keyup.enter)="run()"
      placeholder="e.g. cheddar"
    />
    <button matSuffix mat-icon-button (click)="run()" aria-label="Search">
      <mat-icon>search</mat-icon>
    </button>
  </mat-form-field>

  @if (searching()) {
    <div class="state">
      <mat-progress-spinner mode="indeterminate" diameter="28" />
      <span>Searching {{ provider.displayName }}…</span>
    </div>
  } @else if (error(); as msg) {
    <p class="state error">{{ msg }}</p>
  } @else if (searched() && candidates().length === 0) {
    <p class="state">No matches.</p>
  } @else if (candidates().length) {
    <mat-action-list>
      @for (c of candidates(); track c.external_id) {
        <button mat-list-item (click)="pick(c)">
          <img matListItemAvatar [src]="c.image_url" alt="" />
          <span matListItemTitle>{{ c.name }}</span>
        </button>
      }
    </mat-action-list>
  }

  <div class="actions">
    <button mat-button (click)="close()">Cancel</button>
  </div>
</div>
