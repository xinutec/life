<div class="trend">
  <div class="plot">
    <div class="axis" aria-hidden="true">
      <span>{{ axis()[0] }}</span><span>{{ axis()[1] }}</span><span>{{ axis()[2] }}</span>
    </div>
    <svg
      class="chart"
      [attr.viewBox]="'0 0 ' + chart().w + ' ' + chart().h"
      role="img"
      [attr.aria-label]="label()"
    >
      <line
        class="mid"
        [attr.x1]="0"
        [attr.x2]="chart().w"
        [attr.y1]="chart().h / 2"
        [attr.y2]="chart().h / 2"
      />
      @if (chart().dots.length > 1) {
        <path class="line" [attr.d]="linePath()" />
      }
      @for (dot of chart().dots; track $index) {
        <circle class="dot score-{{ dot.level }}" [attr.cx]="dot.cx" [attr.cy]="dot.cy" r="3.5" />
      }
    </svg>
  </div>
  <p class="caption">{{ caption() }}</p>
</div>
