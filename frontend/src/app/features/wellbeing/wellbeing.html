<h2>Wellbeing</h2>

<p class="prompt">How do you feel right now?</p>
<app-wellbeing-checkin />

@if (hasChart()) {
  <app-trend-chart
    [chart]="chart()"
    [axis]="['great', 'okay', 'awful']"
    caption="Mood · last 14 days"
    label="Your mood over the last 14 days"
  />
}

@if (hasEnergyChart()) {
  <app-trend-chart
    [chart]="energyChart()"
    [axis]="['energetic', 'okay', 'drained']"
    caption="Energy · last 14 days"
    label="Your energy over the last 14 days"
  />
}

<app-list-state
  [loading]="!loaded()"
  [empty]="days().length === 0"
  emptyIcon="mood"
  emptyText="No check-ins yet. Tap a face above to log how you feel."
/>

@for (day of days(); track day.key) {
  <section class="day">
    <h3>{{ day.label }}</h3>
    <div class="entries">
      @for (e of day.entries; track e.ulid) {
        <button
          type="button"
          class="entry score-{{ e.score }}"
          (click)="edit(e)"
          [attr.aria-label]="'Edit ' + meta(e.score).label + ' at ' + time(e.recordedAt)"
        >
          <mat-icon>{{ meta(e.score).icon }}</mat-icon>
          <span class="t">{{ time(e.recordedAt) }}</span>
          @if (e.energy !== null) {
            <mat-icon
              class="has-energy"
              [attr.aria-label]="'energy: ' + energyMeta(e.energy).label"
            >{{ energyMeta(e.energy).icon }}</mat-icon>
          }
          @if (e.emotions.length) {
            <mat-icon
              class="has-emotions"
              [attr.aria-label]="e.emotions.length + ' emotions'"
            >label</mat-icon>
          }
          @if (e.note) {
            <mat-icon class="has-note" aria-label="has a note">sticky_note_2</mat-icon>
          }
        </button>
      }
    </div>
  </section>
}
