<h2>Wellbeing</h2>

<p class="prompt">How do you feel right now?</p>
<app-wellbeing-checkin />

@if (hasChart()) {
  <div class="trend">
    <div class="plot">
      <div class="axis" aria-hidden="true">
        <span>great</span><span>okay</span><span>awful</span>
      </div>
      <svg
        class="chart"
        [attr.viewBox]="'0 0 ' + chart().w + ' ' + chart().h"
        role="img"
        aria-label="Your mood over the last 14 days"
      >
        <line class="mid" [attr.x1]="0" [attr.x2]="chart().w" [attr.y1]="chart().h / 2" [attr.y2]="chart().h / 2" />
        @for (dot of chart().dots; track $index) {
          <circle class="dot score-{{ dot.level }}" [attr.cx]="dot.cx" [attr.cy]="dot.cy" r="3.5" />
        }
      </svg>
    </div>
    <p class="caption">Mood · last 14 days</p>
  </div>
}

@if (hasFatigueChart()) {
  <div class="trend fatigue">
    <div class="plot">
      <div class="axis" aria-hidden="true">
        <span>none</span><span>moderate</span><span>severe</span>
      </div>
      <svg
        class="chart"
        [attr.viewBox]="'0 0 ' + fatigueChart().w + ' ' + fatigueChart().h"
        role="img"
        aria-label="Your fatigue over the last 14 days"
      >
        <line
          class="mid"
          [attr.x1]="0"
          [attr.x2]="fatigueChart().w"
          [attr.y1]="fatigueChart().h / 2"
          [attr.y2]="fatigueChart().h / 2"
        />
        @for (dot of fatigueChart().dots; track $index) {
          <circle class="dot score-{{ dot.level }}" [attr.cx]="dot.cx" [attr.cy]="dot.cy" r="3.5" />
        }
      </svg>
    </div>
    <p class="caption">Fatigue · last 14 days</p>
  </div>
}

<app-list-state
  [loading]="!loaded()"
  [empty]="days().length === 0"
  emptyIcon="mood"
  emptyText="No check-ins yet. Tap a face above to log how you feel."
/>

@for (day of days(); track day.key) {
  <section class="day">
    <h3>{{ day.label }}</h3>
    <div class="entries">
      @for (e of day.entries; track e.ulid) {
        <button
          type="button"
          class="entry score-{{ e.score }}"
          (click)="edit(e)"
          [attr.aria-label]="'Edit ' + meta(e.score).label + ' at ' + time(e.recordedAt)"
        >
          <mat-icon>{{ meta(e.score).icon }}</mat-icon>
          <span class="t">{{ time(e.recordedAt) }}</span>
          @if (e.energy) {
            <mat-icon
              class="has-fatigue"
              [attr.aria-label]="'fatigue: ' + fatigueMeta(e.energy).label"
            >{{ fatigueMeta(e.energy).icon }}</mat-icon>
          }
          @if (e.emotions.length) {
            <mat-icon
              class="has-emotions"
              [attr.aria-label]="e.emotions.length + ' emotions'"
            >label</mat-icon>
          }
          @if (e.note) {
            <mat-icon class="has-note" aria-label="has a note">sticky_note_2</mat-icon>
          }
        </button>
      }
    </div>
  </section>
}
